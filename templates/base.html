<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fancy fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0b1020;
            color: white;
            overflow-x: hidden;
        }

        h1, h2, h3, .navbar-brand {
            font-family: 'Orbitron', sans-serif;
        }

        /* Animated background */
        .animated-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(-45deg, #0f172a, #111827, #1e293b, #0b1120);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            z-index: -3;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -2;
        }

        .particle {
            position: absolute;
            display: block;
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.12);
            border-radius: 50%;
            animation: floatParticle linear infinite;
            bottom: -50px;
        }

        @keyframes floatParticle {
            from {
                transform: translateY(0) scale(1);
                opacity: 0.2;
            }
            to {
                transform: translateY(-110vh) scale(1.4);
                opacity: 0;
            }
        }

        .navbar-custom {
            background: rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .navbar-brand,
        .nav-link {
            color: white !important;
        }

        .navbar-brand span {
            color: #ff5e57;
        }

        .nav-link {
            transition: 0.3s ease;
        }

        .nav-link:hover {
            color: #ff5e57 !important;
            transform: translateY(-2px);
        }

        .hero {
            position: relative;
            min-height: 100vh;
            background: radial-gradient(circle at top, rgba(255,94,87,0.18), transparent 30%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px 60px;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            animation: fadeInUp 1s ease;
        }

        .profile-circle {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.88);
            box-shadow: 0 0 25px rgba(255, 94, 87, 0.45);
            animation: floatImage 3s ease-in-out infinite;
        }

        @keyframes floatImage {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .hero-name {
            font-size: 3.2rem;
            font-weight: 800;
            color: #ff5e57;
            margin-top: 22px;
            text-shadow: 0 0 14px rgba(255,94,87,0.35);
        }

        .hero-tagline {
            font-size: 1.15rem;
            color: #e5e7eb;
            min-height: 32px;
        }

        .section-dark {
            background: rgba(17, 24, 39, 0.72);
            backdrop-filter: blur(6px);
            padding: 90px 0;
        }

        .section-darker {
            background: rgba(11, 17, 32, 0.82);
            backdrop-filter: blur(6px);
            padding: 90px 0;
        }

        .section-subtitle {
            color: #ff5e57;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .about-image {
            width: 100%;
            max-width: 360px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            transition: transform 0.4s ease;
        }

        .about-image:hover {
            transform: scale(1.03);
        }

        .info-box {
            border: 1px solid rgba(255, 94, 87, 0.4);
            padding: 22px;
            border-radius: 14px;
            margin-top: 20px;
            background: rgba(255,255,255,0.03);
            box-shadow: 0 0 18px rgba(255, 94, 87, 0.08);
        }

        .btn-accent {
            background: linear-gradient(135deg, #ff5e57, #ff7b72);
            border: none;
            color: white;
            padding: 12px 24px;
            font-weight: 600;
            border-radius: 999px;
            box-shadow: 0 8px 22px rgba(255, 94, 87, 0.35);
            transition: all 0.3s ease;
        }

        .btn-accent:hover {
            color: white;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 28px rgba(255, 94, 87, 0.45);
        }

        .btn-outline-glow {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            padding: 12px 24px;
            border-radius: 999px;
            transition: all 0.3s ease;
        }

        .btn-outline-glow:hover {
            border-color: #ff5e57;
            color: #ff5e57;
            box-shadow: 0 0 14px rgba(255, 94, 87, 0.3);
            transform: translateY(-3px);
        }

        .skill-card,
        .project-card,
        .contact-box {
            background: rgba(23, 32, 51, 0.86);
            border: 1px solid rgba(255, 94, 87, 0.22);
            border-radius: 16px;
            padding: 25px;
            height: 100%;
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
        }

        .skill-card:hover,
        .project-card:hover,
        .contact-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 34px rgba(0,0,0,0.28);
            border-color: rgba(255, 94, 87, 0.55);
        }

        .muted-text {
            color: #cbd5e1;
        }

        footer {
            background: rgba(8, 12, 22, 0.92);
            color: #94a3b8;
            text-align: center;
            padding: 22px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        /* Scroll animation */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glow-line {
            width: 90px;
            height: 4px;
            background: linear-gradient(to right, #ff5e57, transparent);
            border-radius: 30px;
            margin-bottom: 24px;
        }

        textarea,
        input {
            background-color: rgba(255,255,255,0.06) !important;
            color: white !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            border-radius: 12px !important;
        }

        textarea::placeholder,
        input::placeholder {
            color: #cbd5e1 !important;
        }

        @media (max-width: 768px) {
            .hero-name {
                font-size: 2.2rem;
            }
            .section-title {
                font-size: 1.9rem;
            }
            .profile-circle {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<div class="particles">
    <span class="particle" style="left: 5%; animation-duration: 13s; animation-delay: 0s;"></span>
    <span class="particle" style="left: 15%; animation-duration: 18s; animation-delay: 2s;"></span>
    <span class="particle" style="left: 27%; animation-duration: 15s; animation-delay: 1s;"></span>
    <span class="particle" style="left: 40%; animation-duration: 20s; animation-delay: 4s;"></span>
    <span class="particle" style="left: 55%; animation-duration: 12s; animation-delay: 3s;"></span>
    <span class="particle" style="left: 68%; animation-duration: 17s; animation-delay: 5s;"></span>
    <span class="particle" style="left: 79%; animation-duration: 14s; animation-delay: 2s;"></span>
    <span class="particle" style="left: 90%; animation-duration: 19s; animation-delay: 6s;"></span>
</div>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}"><span>My</span>Portfolio</a>
        <div>
            <a class="nav-link d-inline-block" href="{% url 'home' %}">Home</a>
            <a class="nav-link d-inline-block" href="{% url 'about' %}">About</a>
            <a class="nav-link d-inline-block" href="{% url 'skills' %}">Skills</a>
            <a class="nav-link d-inline-block" href="{% url 'projects' %}">Projects</a>
            <a class="nav-link d-inline-block" href="{% url 'education' %}">Education</a>
            <a class="nav-link d-inline-block" href="{% url 'contact' %}">Contact</a>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<footer>
    <p class="mb-0">© 2026 My Portfolio. All rights reserved.</p>
</footer>

<script>
    // reveal on scroll
    const reveals = document.querySelectorAll('.reveal');

    function revealOnScroll() {
        for (let i = 0; i < reveals.length; i++) {
            const windowHeight = window.innerHeight;
            const elementTop = reveals[i].getBoundingClientRect().top;
            const visiblePoint = 100;

            if (elementTop < windowHeight - visiblePoint) {
                reveals[i].classList.add('active');
            }
        }
    }

    window.addEventListener('scroll', revealOnScroll);
    revealOnScroll();

    // typing effect
    const typingElement = document.getElementById('typing-text');
    if (typingElement) {
        const text = typingElement.getAttribute('data-text');
        let index = 0;

        function typeEffect() {
            if (index < text.length) {
                typingElement.innerHTML += text.charAt(index);
                index++;
                setTimeout(typeEffect, 70);
            }
        }

        typingElement.innerHTML = "";
        typeEffect();
    }
</script>

</body>
</html>
