{% extends 'base.html' %}

{% block title %}About{% endblock %}

{% block content %}
<section class="section-dark reveal" style="padding-top: 140px;">
    <div class="container">
        <p class="section-subtitle">Discover</p>
        <h1 class="section-title">About Me</h1>
        <div class="glow-line"></div>

        <div class="row align-items-center g-5">
            <div class="col-md-5 text-center">
                {% if profile.profile_photo %}
                    <img src="{{ profile.profile_photo.url }}" alt="Profile Photo" class="about-image">
                {% endif %}
            </div>
            <div class="col-md-7">
                <p class="muted-text">{{ profile.bio }}</p>

                <div class="info-box">
                    <p><strong>Full Name:</strong> {{ profile.full_name }}</p>
                    <p><strong>Email:</strong> {{ profile.email }}</p>
                    <p><strong>Career Goals:</strong> {{ profile.career_goals }}</p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
